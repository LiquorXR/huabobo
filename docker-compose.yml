version: '3.8'

services:
  web:
    build: .
    container_name: huabobo_web
    restart: always
    ports:
      - "3179:3179"
    environment:
      - PORT=3179
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=postgres_password
      - DB_NAME=huabobo
      - JWT_SECRET=您的私钥_请勿泄露!
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: huabobo_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: huabobo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d huabobo"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
