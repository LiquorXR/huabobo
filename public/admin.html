<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花饽饽 - 后台管理</title>
    <script src="lib/tailwind.min.js"></script>
    <script src="lib/lucide/lucide.min.js"></script>
    <script src="lib/chart.min.js"></script>
    <script src="lib/three/three.min.js"></script>
    <script src="lib/three/GLTFLoader.js"></script>
    <script src="lib/three/OBJLoader.js"></script>
    <script src="lib/three/DRACOLoader.js"></script>
    <style>
        @media (max-width: 767px) {
            #dash-view {
                flex-direction: column;
                height: 100dvh;
            }

            #dash-view > aside {
                width: 100%;
                flex: 0 0 auto;
                border-bottom-left-radius: 1.5rem;
                border-bottom-right-radius: 1.5rem;
                box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
            }

            #dash-view > aside > div:first-child {
                padding: max(1rem, env(safe-area-inset-top)) 1rem 0.75rem;
            }

            #dash-view > aside nav {
                display: flex;
                gap: 0.625rem;
                overflow-x: auto;
                padding: 0 1rem 1rem;
                white-space: nowrap;
                scrollbar-width: none;
            }

            #dash-view > aside nav::-webkit-scrollbar {
                display: none;
            }

            #dash-view > aside nav button {
                width: auto;
                flex: 0 0 auto;
                padding: 0.85rem 1rem;
                border-radius: 999px;
                font-size: 0.875rem;
            }

            #dash-view > aside > div:last-child {
                padding: 0 1rem max(1rem, env(safe-area-inset-bottom));
                border-top: 0;
            }

            #dash-view > aside > div:last-child button {
                border-radius: 999px;
            }

            #dash-view > main {
                padding: 1rem 0.875rem calc(1.25rem + env(safe-area-inset-bottom));
            }

            #dash-view > main > header {
                margin-bottom: 1rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.625rem;
            }

            #view-title {
                font-size: 1.75rem;
                line-height: 1.1;
            }

            #view-actions {
                width: 100%;
            }

            #content-dashboard > .grid {
                gap: 0.875rem;
                margin-bottom: 1rem;
            }

            #content-dashboard > .grid > div,
            #content-dashboard > div.bg-white,
            #content-projects > div,
            #content-users > div,
            #content-resources > div {
                border-radius: 1.25rem;
            }

            #content-projects > div,
            #content-users > div,
            #content-resources > div {
                padding: 0;
            }

            #content-dashboard > .grid > div {
                padding: 1rem;
            }

            #content-dashboard > .grid > div h3 {
                font-size: 1.75rem;
            }

            #content-dashboard > .grid > div > div:last-child {
                width: 2.75rem;
                height: 2.75rem;
            }

            #content-dashboard canvas {
                max-height: 260px;
            }

            #content-projects table,
            #content-users table,
            #content-resources table {
                min-width: 640px;
            }

            #content-projects .overflow-x-auto,
            #content-users .overflow-x-auto,
            #content-resources .overflow-x-auto {
                margin-left: -0.25rem;
                margin-right: -0.25rem;
                padding-left: 0.25rem;
                padding-right: 0.25rem;
                -webkit-overflow-scrolling: touch;
            }

            #content-projects th,
            #content-projects td,
            #content-users th,
            #content-users td,
            #content-resources th,
            #content-resources td {
                padding-left: 1rem;
                padding-right: 1rem;
                white-space: nowrap;
            }

            #content-resources {
                gap: 1rem;
            }

            #content-resources > div > div:first-child {
                flex-direction: column;
                align-items: stretch;
                gap: 0.875rem;
                margin-bottom: 1rem;
            }

            #content-resources > div > div:first-child button {
                width: 100%;
                justify-content: center;
            }

            #upload-modal {
                padding: 1rem;
            }

            #upload-modal > div {
                max-height: calc(100dvh - 2rem);
                overflow-y: auto;
                padding: 1.25rem;
                border-radius: 1.75rem;
            }

            #upload-form .flex.gap-4.mt-8 {
                flex-direction: column-reverse;
                gap: 0.75rem;
                margin-top: 1.25rem;
            }

            #admin-dialog {
                padding: 1.5rem;
                border-radius: 1.75rem;
            }

            #admin-dialog-actions {
                flex-direction: column-reverse;
            }

            #admin-dialog-actions button {
                width: 100%;
            }
        }
    </style>

</head>
<body class="bg-gray-50 text-slate-800">

<div id="dash-view" class="hidden flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6">
            <h1 class="text-2xl font-black text-amber-500 tracking-wider">DIY<span class="text-white">Admin</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 bg-blue-600/20 text-blue-400 px-4 py-3 rounded-xl border border-blue-500/20 transition-all"><i data-lucide="layout-dashboard"></i> 总览</button>
            <button onclick="switchTab('users')" id="nav-users" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition text-slate-300"><i data-lucide="users"></i> 用户管理</button>
            <button onclick="switchTab('projects')" id="nav-projects" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition text-slate-300"><i data-lucide="box"></i> 作品管理</button>
            <button onclick="switchTab('resources')" id="nav-resources" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition text-slate-300"><i data-lucide="folder-tree"></i> 资源管理</button>

        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logoutAdmin()" class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl bg-rose-500/10 text-rose-300 border border-rose-500/20 hover:bg-rose-500/20 transition-all font-bold">
                <i data-lucide="log-out"></i>
                <span>退出登录</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-y-auto bg-gray-50 p-8">
        <header class="mb-8 flex justify-between items-center">
            <h2 id="view-title" class="text-3xl font-bold text-gray-800">数据看板</h2>
            <div id="view-actions"></div>
        </header>
        
        <div id="content-dashboard">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Stat Cards -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-bold text-gray-400">总用户数</p>
                        <h3 class="text-3xl font-black text-blue-600 mt-1" id="stat-users">-</h3>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500"><i data-lucide="users" size="24"></i></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-bold text-gray-400">总作品量</p>
                        <h3 class="text-3xl font-black text-emerald-600 mt-1" id="stat-projects">-</h3>
                    </div>
                    <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500"><i data-lucide="folder-kanban" size="24"></i></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-bold text-gray-400">社区总获赞</p>
                        <h3 class="text-3xl font-black text-rose-600 mt-1" id="stat-likes">-</h3>
                    </div>
                    <div class="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500"><i data-lucide="heart" size="24"></i></div>
                </div>
            </div>

            <div class="bg-white border border-gray-100 shadow-sm rounded-2xl p-6 mb-8">
                <h3 class="text-lg font-bold mb-4">近7日数据趋势</h3>
                <div class="h-[300px]">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Projects View (Hidden by default) -->
        <div id="content-projects" class="hidden">
            <div class="bg-white border text-left border-gray-100 shadow-sm rounded-2xl overflow-hidden flex flex-col">
                <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">预览</th>
                            <th class="px-6 py-4">作品名</th>
                            <th class="px-6 py-4">作者</th>
                            <th class="px-6 py-4">公开状态</th>
                            <th class="px-6 py-4 text-right">管理</th>
                        </tr>
                    </thead>
                    <tbody id="projects-table-body" class="divide-y divide-gray-100">
                    </tbody>
                </table>
                </div>
            </div>
        </div>

        <!-- Users View (Hidden by default) -->
        <div id="content-users" class="hidden">
            <div class="bg-white border text-left border-gray-100 shadow-sm rounded-2xl overflow-hidden flex flex-col">
                <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">用户名</th>
                            <th class="px-6 py-4">角色</th>
                            <th class="px-6 py-4">加入时间</th>
                            <th class="px-6 py-4 text-right">管理</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-gray-100">
                    </tbody>
                </table>
                </div>
            </div>
        </div>
        <!-- Resources View (Hidden by default) -->
        <div id="content-resources" class="hidden space-y-8">
            <!-- 3D Models Management -->
            <div class="bg-white border border-gray-100 shadow-sm rounded-2xl overflow-hidden flex flex-col p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800">3D 模型库</h3>
                    <button onclick="openUploadModal('models')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-700 transition"><i data-lucide="upload" size="16"></i> 上传模型</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-600">
                        <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                            <tr>
                                <th class="px-6 py-4">模型名称</th>
                                <th class="px-6 py-4">文件名</th>
                                <th class="px-6 py-4">上传时间</th>
                                <th class="px-6 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="models-table-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <!-- Carousel Images Management -->
            <div class="bg-white border border-gray-100 shadow-sm rounded-2xl overflow-hidden flex flex-col p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-800">首页轮播图</h3>
                    <button onclick="openUploadModal('carousel')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 transition"><i data-lucide="image" size="16"></i> 上传图片</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-gray-600">
                        <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                            <tr>
                                <th class="px-6 py-4">预览</th>
                                <th class="px-6 py-4">排序</th>
                                <th class="px-6 py-4">文件名</th>
                                <th class="px-6 py-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="carousel-table-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Upload Modal (Hidden) -->
        <div id="upload-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
            <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
                <h3 id="modal-title" class="text-2xl font-bold mb-6">上传资源</h3>
                <form id="upload-form" onsubmit="handleUpload(event)" class="space-y-4">
                    <input type="hidden" id="upload-type">
                    <div id="name-field">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">显示名称</label>
                        <input type="text" id="resource-name" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div id="order-field" class="hidden">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">排序权重</label>
                        <input type="number" id="resource-order" value="0" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div id="preview-area" class="hidden">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">预览图生成</label>
                        <div id="upload-preview-container" class="w-full aspect-square bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden border-2 border-dashed border-slate-200">
                            <span class="text-xs text-slate-400">正在解析 3D 预览...</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">文件</label>
                        <input type="file" id="resource-file" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                        <p id="file-hint" class="text-[10px] text-gray-400 mt-1"></p>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button type="button" onclick="closeUploadModal()" class="flex-1 px-4 py-3 border border-gray-200 rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition">取消</button>
                        <button id="upload-submit-btn" type="submit" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/20">开始上传</button>
                    </div>
                    <div id="upload-status" class="hidden rounded-2xl bg-blue-50 px-4 py-3 text-sm font-medium text-blue-700"></div>
                </form>
            </div>
        </div>

        <div id="admin-dialog-overlay" class="fixed inset-0 bg-black/45 backdrop-blur-sm z-[70] hidden opacity-0 transition-opacity duration-300">
            <div class="absolute inset-0" onclick="dismissAdminDialog()"></div>
            <div class="min-h-full flex items-center justify-center p-4">
                <div id="admin-dialog" class="relative w-full max-w-md bg-white rounded-3xl border border-gray-200 shadow-2xl p-8 hidden opacity-0 scale-95 transition-all duration-300">
                    <button type="button" onclick="dismissAdminDialog()" class="absolute top-5 right-5 p-2 rounded-full bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
                        <i data-lucide="x" size="18"></i>
                    </button>
                    <div class="flex items-start gap-4 mb-6">
                        <div id="admin-dialog-icon" class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center shrink-0">
                            <i id="admin-dialog-icon-symbol" data-lucide="sparkles" size="22"></i>
                        </div>
                        <div>
                            <p id="admin-dialog-kicker" class="text-[10px] font-black text-gray-400 uppercase tracking-[0.32em] mb-1">System</p>
                            <h3 id="admin-dialog-title" class="text-2xl font-bold text-gray-800">提示</h3>
                            <p id="admin-dialog-message" class="text-sm text-gray-500 mt-2 leading-relaxed"></p>
                        </div>
                    </div>
                    <div id="admin-dialog-actions" class="flex justify-end gap-3"></div>
                </div>
            </div>
        </div>
    </main>
</div>


<script>
    lucide.createIcons();
    
    // 自动关联主站 Token
    let token = localStorage.getItem('admin_token');
    if (!token) {
        // 尝试从主站 Token 获取
        const mainToken = localStorage.getItem('huabobo_token');
        const userDataStr = localStorage.getItem('huabobo_user');
        if (mainToken && userDataStr) {
            try {
                const userData = JSON.parse(userDataStr);
                if (userData.role === 'admin') {
                    token = mainToken;
                    localStorage.setItem('admin_token', token);
                }
            } catch(e) {}
        }
    }

    if(token) { 
        showDash(); 
    } else {
        // 如果没有管理员权限，重定向回主页
        showAdminAlert("请先以管理员身份登录。", 'warning', '无访问权限').then(() => {
            window.location.href = '/';
        });
    }

    let trendChart = null;
    let isUploading = false;
    let activeAdminDialog = null;

    function getAdminDialogElements() {
        return {
            overlay: document.getElementById('admin-dialog-overlay'),
            dialog: document.getElementById('admin-dialog'),
            kicker: document.getElementById('admin-dialog-kicker'),
            title: document.getElementById('admin-dialog-title'),
            message: document.getElementById('admin-dialog-message'),
            icon: document.getElementById('admin-dialog-icon'),
            iconSymbol: document.getElementById('admin-dialog-icon-symbol'),
            actions: document.getElementById('admin-dialog-actions')
        };
    }

    function dismissAdminDialog() {
        if (!activeAdminDialog) return;
        const { overlay, dialog } = getAdminDialogElements();
        dialog.classList.add('opacity-0', 'scale-95');
        overlay.classList.add('opacity-0');
        setTimeout(() => {
            dialog.classList.add('hidden');
            overlay.classList.add('hidden');
        }, 300);

        const current = activeAdminDialog;
        activeAdminDialog = null;
        if (current.resolve) current.resolve(current.fallbackValue);
    }

    function openAdminDialog(options = {}) {
        const els = getAdminDialogElements();
        const toneMap = {
            info: { kicker: 'System', title: '提示', icon: 'sparkles', iconClass: 'w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center shrink-0' },
            success: { kicker: 'Success', title: '操作成功', icon: 'check', iconClass: 'w-12 h-12 rounded-2xl bg-emerald-600 text-white flex items-center justify-center shrink-0' },
            warning: { kicker: 'Warning', title: '请确认', icon: 'triangle-alert', iconClass: 'w-12 h-12 rounded-2xl bg-amber-500 text-white flex items-center justify-center shrink-0' },
            error: { kicker: 'Error', title: '操作失败', icon: 'circle-alert', iconClass: 'w-12 h-12 rounded-2xl bg-rose-500 text-white flex items-center justify-center shrink-0' }
        };
        const tone = toneMap[options.tone || 'info'] || toneMap.info;

        els.kicker.innerText = options.kicker || tone.kicker;
        els.title.innerText = options.title || tone.title;
        els.message.innerText = options.message || '';
        els.icon.className = options.iconClass || tone.iconClass;
        els.iconSymbol.setAttribute('data-lucide', options.icon || tone.icon);
        els.actions.innerHTML = '';

        const buttons = options.buttons || [{ label: '知道了', value: true, kind: 'primary' }];
        buttons.forEach((button) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerText = button.label;
            btn.className = button.kind === 'secondary'
                ? 'px-4 py-3 rounded-xl border border-gray-200 text-gray-500 font-bold hover:bg-gray-50 transition'
                : button.kind === 'danger'
                    ? 'px-4 py-3 rounded-xl bg-rose-600 text-white font-bold hover:bg-rose-700 transition'
                    : 'px-4 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition';
            btn.onclick = () => {
                const current = activeAdminDialog;
                activeAdminDialog = null;
                els.dialog.classList.add('opacity-0', 'scale-95');
                els.overlay.classList.add('opacity-0');
                setTimeout(() => {
                    els.dialog.classList.add('hidden');
                    els.overlay.classList.add('hidden');
                }, 300);
                if (current && current.resolve) current.resolve(button.value);
            };
            els.actions.appendChild(btn);
        });

        return new Promise((resolve) => {
            activeAdminDialog = { resolve, fallbackValue: options.fallbackValue ?? false };
            els.overlay.classList.remove('hidden');
            els.dialog.classList.remove('hidden');
            setTimeout(() => {
                els.overlay.classList.remove('opacity-0');
                els.dialog.classList.remove('opacity-0', 'scale-95');
                lucide.createIcons({ root: els.dialog });
            }, 10);
        });
    }

    function showAdminAlert(message, tone = 'info', title = '') {
        return openAdminDialog({
            message,
            tone,
            title,
            buttons: [{ label: '知道了', value: true, kind: tone === 'error' ? 'danger' : 'primary' }],
            fallbackValue: true
        });
    }

    function showAdminConfirm(message, options = {}) {
        return openAdminDialog({
            message,
            tone: options.tone || 'warning',
            title: options.title || '请确认',
            buttons: [
                { label: options.cancelLabel || '取消', value: false, kind: 'secondary' },
                { label: options.confirmLabel || '确认', value: true, kind: options.confirmKind || 'primary' }
            ],
            fallbackValue: false
        });
    }

    async function logoutAdmin(message = '') {
        if (message) {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('huabobo_token');
            localStorage.removeItem('huabobo_user');
            showAdminAlert(message, 'warning', '登录状态失效').then(() => {
                window.location.href = '/';
            });
            return;
        }

        const confirmed = await showAdminConfirm('退出后将返回首页，是否继续？', {
            title: '退出登录',
            confirmLabel: '确认退出',
            confirmKind: 'danger'
        });
        if (!confirmed) return;

        localStorage.removeItem('admin_token');
        localStorage.removeItem('huabobo_token');
        localStorage.removeItem('huabobo_user');
        window.location.href = '/';
    }

    function switchTab(tab) {
        // Hide all views
        document.getElementById('content-dashboard').classList.add('hidden');
        document.getElementById('content-users').classList.add('hidden');
        document.getElementById('content-projects').classList.add('hidden');
        
        // Reset nav styles
        const tabs = ['dashboard', 'users', 'projects', 'resources'];
        tabs.forEach(t => {
            const el = document.getElementById('nav-' + t);
            if (el) {
                el.classList.remove('bg-blue-600/20', 'text-blue-400', 'border', 'border-blue-500/20');
                el.classList.add('hover:bg-slate-800', 'text-slate-300');
            }
        });

        // Activate selected tab
        const activeNav = document.getElementById('nav-' + tab);
        if (activeNav) {
            activeNav.classList.add('bg-blue-600/20', 'text-blue-400', 'border', 'border-blue-500/20');
            activeNav.classList.remove('hover:bg-slate-800', 'text-slate-300');
        }

        const title = document.getElementById('view-title');
        document.getElementById('content-resources').classList.add('hidden'); // Ensure resources is hidden if not active
        
        if (tab === 'dashboard') {
            document.getElementById('content-dashboard').classList.remove('hidden');
            title.innerText = '数据看板';
            loadData();
        } else if (tab === 'users') {
            document.getElementById('content-users').classList.remove('hidden');
            title.innerText = '用户管理';
            loadUsers();
        } else if (tab === 'projects') {
            document.getElementById('content-projects').classList.remove('hidden');
            title.innerText = '作品管理';
            loadAllProjects();
        } else if (tab === 'resources') {
            document.getElementById('content-resources').classList.remove('hidden');
            title.innerText = '资源管理';
            loadModels();
            loadCarousel();
        }
    }

    // Resource Management Logic
    async function loadModels() {
        try {
            const res = await fetch('/api/admin/resources/models', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const models = await res.json();
            const tbody = document.getElementById('models-table-body');
            tbody.innerHTML = models.map(m => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-bold text-gray-800">${m.name}</td>
                    <td class="px-6 py-4 text-xs text-gray-400">${m.file_name}</td>
                    <td class="px-6 py-4 text-xs">${new Date(m.createdAt).toLocaleString()}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteResource('models', '${m.id}')" class="text-red-500 hover:text-red-700 font-medium">删除</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadCarousel() {
        try {
            const res = await fetch('/api/admin/resources/carousel', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const images = await res.json();
            const tbody = document.getElementById('carousel-table-body');
            tbody.innerHTML = images.map(img => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <img src="/api/resources/carousel/${img.id}" class="w-20 h-12 object-cover rounded border">
                    </td>
                    <td class="px-6 py-4 font-mono text-xs">${img.order}</td>
                    <td class="px-6 py-4 text-xs text-gray-400">${img.file_name}</td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteResource('carousel', '${img.id}')" class="text-red-500 hover:text-red-700 font-medium">删除</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    function openUploadModal(type) {
        document.getElementById('upload-type').value = type;
        document.getElementById('modal-title').innerText = type === 'models' ? '上传 3D 模型' : '上传轮播图';
        document.getElementById('name-field').style.display = type === 'models' ? 'block' : 'none';
        document.getElementById('order-field').style.display = type === 'carousel' ? 'block' : 'none';
        document.getElementById('preview-area').style.display = type === 'models' ? 'block' : 'none';
        document.getElementById('file-hint').innerText = type === 'models' ? '支持 .glb, .gltf, .obj 格式' : '支持 .jpg, .png 格式';
        document.getElementById('resource-file').accept = type === 'models' ? '.glb,.gltf,.obj' : '.jpg,.jpeg,.png';
        document.getElementById('upload-modal').classList.remove('hidden');
        
        // Clear previous preview
        document.getElementById('upload-preview-container').innerHTML = '<span class="text-xs text-slate-400">等待选择文件...</span>';
        setUploadState(false);
        currentGeneratedThumbnail = null;
    }

    function closeUploadModal() {
        if (isUploading) return;
        document.getElementById('upload-modal').classList.add('hidden');
        document.getElementById('upload-form').reset();
        currentGeneratedThumbnail = null;
        setUploadState(false);
    }

    let currentGeneratedThumbnail = null;

    function setUploadState(uploading, message = '') {
        isUploading = uploading;
        const submitBtn = document.getElementById('upload-submit-btn');
        const status = document.getElementById('upload-status');
        const fileInput = document.getElementById('resource-file');
        const cancelBtn = document.querySelector('#upload-form button[type="button"]');

        if (submitBtn) {
            submitBtn.disabled = uploading;
            submitBtn.innerText = uploading ? '上传中...' : '开始上传';
            submitBtn.classList.toggle('opacity-70', uploading);
            submitBtn.classList.toggle('cursor-not-allowed', uploading);
        }

        if (fileInput) fileInput.disabled = uploading;
        if (cancelBtn) {
            cancelBtn.disabled = uploading;
            cancelBtn.classList.toggle('opacity-60', uploading);
            cancelBtn.classList.toggle('cursor-not-allowed', uploading);
        }

        if (status) {
            if (message) {
                status.classList.remove('hidden');
                status.innerText = message;
            } else {
                status.classList.add('hidden');
                status.innerText = '';
            }
        }
    }


    // Listen for file selection to generate preview
    document.getElementById('resource-file').onchange = async function(e) {
        const type = document.getElementById('upload-type').value;
        if (type !== 'models' || !this.files[0]) return;

        const container = document.getElementById('upload-preview-container');
        container.innerHTML = '<div class="w-8 h-8 border-4 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>';

        try {
            const file = this.files[0];
            const url = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toLowerCase();
            
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(300, 300);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            let mesh;
            if (ext === 'glb' || ext === 'gltf') {
                const loader = new THREE.GLTFLoader();
                const dracoLoader = new THREE.DRACOLoader();
                dracoLoader.setDecoderPath('lib/draco/');
                loader.setDRACOLoader(dracoLoader);
                const gltf = await loader.loadAsync(url);
                mesh = gltf.scene;
            } else if (ext === 'obj') {
                const loader = new THREE.OBJLoader();
                mesh = await loader.loadAsync(url);
            }

            if (mesh) {
                scene.add(mesh);
                const box = new THREE.Box3().setFromObject(mesh);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(center.x + maxDim, center.y + maxDim, center.z + maxDim);
                camera.lookAt(center);
                
                renderer.render(scene, camera);
                currentGeneratedThumbnail = renderer.domElement.toDataURL('image/webp', 0.7);
                container.innerHTML = `<img src="${currentGeneratedThumbnail}" class="w-full h-full object-contain p-2">`;
                
                // Cleanup
                URL.revokeObjectURL(url);
                renderer.dispose();
            }
        } catch (e) {
            console.error("Preview generation failed", e);
            container.innerHTML = '<span class="text-xs text-red-400">预览生成失败</span>';
        }
    };

    async function handleUpload(e) {
        e.preventDefault();
        if (isUploading) return;
        const type = document.getElementById('upload-type').value;
        const fileInput = document.getElementById('resource-file');
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        if (type === 'models') {
            formData.append('name', document.getElementById('resource-name').value);
            if (currentGeneratedThumbnail) {
                formData.append('thumbnail', currentGeneratedThumbnail);
            }
        } else {
            formData.append('order', document.getElementById('resource-order').value);
        }


        try {
            setUploadState(true, type === 'models' ? '正在上传模型并保存预览，请稍候...' : '正在上传轮播图，请稍候...');
            const res = await fetch(`/api/admin/resources/${type}`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            if (res.ok) {
                setUploadState(false);
                closeUploadModal();
                if (type === 'models') loadModels();
                else loadCarousel();
                await showAdminAlert('上传完成', 'success', '上传成功');
            } else {
                const data = await res.json();
                setUploadState(false);
                await showAdminAlert(data.error || "上传失败", 'error', '上传失败');
            }
        } catch(e) {
            setUploadState(false);
            console.error(e);
            await showAdminAlert('上传失败，请稍后重试', 'error', '上传失败');
        }
    }

    async function deleteResource(type, id) {
        const confirmed = await showAdminConfirm('确定要永久删除此资源吗？', {
            title: '删除资源',
            confirmLabel: '删除',
            confirmKind: 'danger'
        });
        if (!confirmed) return;
        try {
            const res = await fetch(`/api/admin/resources/${type}/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                if (type === 'models') loadModels();
                else loadCarousel();
            } else {
                await showAdminAlert("删除失败", 'error', '删除失败');
            }
        } catch(e) { console.error(e); }
    }


    async function loadAllProjects() {
        try {
            const res = await fetch('/api/admin/projects', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const projects = await res.json();
            const tbody = document.getElementById('projects-table-body');
            tbody.innerHTML = projects.map(p => {
                let thumbSrc = '';
                if (p.thumbnail) {
                    try {
                        const thumbs = JSON.parse(p.thumbnail);
                        thumbSrc = Array.isArray(thumbs) ? thumbs[0] : p.thumbnail;
                    } catch(e) {
                        thumbSrc = p.thumbnail;
                    }
                }

                return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono text-xs text-gray-400">${p.id.substring(0,8)}...</td>
                    <td class="px-6 py-4">
                        ${thumbSrc ? `<img src="${thumbSrc}" class="w-12 h-12 rounded object-cover border bg-gray-50">` : '<span class="text-gray-300">无图</span>'}
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-800">${p.name}</td>
                    <td class="px-6 py-4">${p.User ? p.User.username : '未知'}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-[10px] rounded-full uppercase tracking-wider ${p.is_public ? 'bg-emerald-100 text-emerald-600' : 'bg-gray-100 text-gray-500'}">${p.is_public ? '公开' : '私有'}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteProject('${p.id}', true)" class="text-red-500 hover:text-red-700 font-medium">删除</button>
                    </td>
                </tr>`;
            }).join('');

        } catch(e) { console.error(e); }
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/admin/users', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const users = await res.json();
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = users.map(u => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono text-xs text-gray-400">${u.id.substring(0,8)}...</td>
                    <td class="px-6 py-4 font-bold text-gray-800">${u.username}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-[10px] rounded-full uppercase tracking-wider ${u.role === 'admin' ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-500'}">${u.role}</span>
                    </td>
                    <td class="px-6 py-4 text-xs">${new Date(u.createdAt).toLocaleString()}</td>
                    <td class="px-6 py-4 text-right">
                        ${u.role !== 'admin' ? `<button onclick="deleteUser('${u.id}')" class="text-red-500 hover:text-red-700 font-medium">注销账号</button>` : '<span class="text-gray-300 text-xs italic">受保护</span>'}
                    </td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }



    async function deleteUser(id) {
        const confirmed = await showAdminConfirm('确定要永久注销此用户吗？其所有作品也将一并删除。', {
            title: '注销用户',
            confirmLabel: '确认注销',
            confirmKind: 'danger'
        });
        if(!confirmed) return;
        try {
            const res = await fetch('/api/admin/user/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                await showAdminAlert(data.error || "删除失败", 'error', '删除失败');
            }
        } catch(e) { console.error(e); }
    }

    function showDash() {
        const dashView = document.getElementById('dash-view');
        if (dashView) dashView.classList.remove('hidden');
        loadData();
    }

    async function loadData() {
        try {
            const res = await fetch('/api/admin/stats', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.status === 401 || res.status === 403) {
                logoutAdmin("登录已过期，请重新登录。");
                return;
            }
            const data = await res.json();
            document.getElementById('stat-users').innerText = data.userCount;
            document.getElementById('stat-projects').innerText = data.projectCount;
            document.getElementById('stat-likes').innerText = data.likeCount;
            
            renderChart(data.trendData);
        } catch(e) {
            console.error(e);
        }
    }

    function renderChart(trend) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: trend.map(t => t.date),
                datasets: [
                    {
                        label: '新增用户',
                        data: trend.map(t => t.users),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: '新增作品',
                        data: trend.map(t => t.projects),
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    async function deleteProject(id, isManageView = false) {
        const confirmed = await showAdminConfirm('该操作将永久删除此作品，确认？', {
            title: '删除作品',
            confirmLabel: '删除',
            confirmKind: 'danger'
        });
        if(!confirmed) return;
        try {
            const res = await fetch('/api/admin/project/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.ok) {
                if (isManageView) loadAllProjects();
                else loadData();
            } else {
                await showAdminAlert("删除失败", 'error', '删除失败');
            }
        } catch(e) { console.error(e); }
    }
</script>
