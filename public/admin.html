<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花饽饽 - 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-slate-800">

<div id="login-view" class="fixed inset-0 flex items-center justify-center bg-gray-50 z-50">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-96 border border-gray-100">
        <h2 class="text-2xl font-black mb-6 text-center text-slate-700">后台管理登录</h2>
        <input type="text" id="admin-user" class="w-full p-3 mb-4 bg-gray-50 border rounded-xl" placeholder="管理员账号">
        <input type="password" id="admin-pass" class="w-full p-3 mb-6 bg-gray-50 border rounded-xl" placeholder="密码">
        <button onclick="loginAdmin()" class="w-full p-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">登录</button>
    </div>
</div>

<div id="dash-view" class="hidden flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6">
            <h1 class="text-2xl font-black text-amber-500 tracking-wider">DIY<span class="text-white">Admin</span></h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 bg-blue-600/20 text-blue-400 px-4 py-3 rounded-xl border border-blue-500/20"><i data-lucide="layout-dashboard"></i> 总览</a>
            <a href="#" class="flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition text-slate-300"><i data-lucide="users"></i> 用户管理</a>
            <a href="#" class="flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition text-slate-300"><i data-lucide="box"></i> 作品审核</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logoutAdmin()" class="w-full flex justify-center py-2 text-rose-400 hover:text-rose-300"><i data-lucide="log-out" class="mr-2"></i> 登出</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-y-auto bg-gray-50 p-8">
        <header class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">数据看板</h2>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-gray-400">总用户数</p>
                    <h3 class="text-3xl font-black text-blue-600 mt-1" id="stat-users">-</h3>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500"><i data-lucide="users" size="24"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-gray-400">总作品量</p>
                    <h3 class="text-3xl font-black text-emerald-600 mt-1" id="stat-projects">-</h3>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500"><i data-lucide="folder-kanban" size="24"></i></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-gray-400">社区总获赞</p>
                    <h3 class="text-3xl font-black text-rose-600 mt-1" id="stat-likes">-</h3>
                </div>
                <div class="w-12 h-12 bg-rose-50 rounded-full flex items-center justify-center text-rose-500"><i data-lucide="heart" size="24"></i></div>
            </div>
        </div>

        <div class="bg-white border text-left border-gray-100 shadow-sm rounded-2xl flex-1 max-h-[600px] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-100">
                <h3 class="text-lg font-bold">最新作品大屏</h3>
            </div>
            <div class="p-0 overflow-y-auto flex-1">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">预览</th>
                            <th class="px-6 py-4">作品名</th>
                            <th class="px-6 py-4">作者</th>
                            <th class="px-6 py-4">公开状态</th>
                            <th class="px-6 py-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    
    let token = localStorage.getItem('admin_token');

    if(token) { showDash(); }

    async function loginAdmin() {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error);
            if(data.user.role !== 'admin') throw new Error("您不是管理员。");
            
            token = data.token;
            localStorage.setItem('admin_token', token);
            showDash();
        } catch(e) {
            alert(e.message);
        }
    }

    function logoutAdmin() {
        localStorage.removeItem('admin_token');
        location.reload();
    }

    function showDash() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('dash-view').classList.remove('hidden');
        loadData();
    }

    async function loadData() {
        try {
            const res = await fetch('/api/admin/stats', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.status === 401 || res.status === 403) {
                return logoutAdmin();
            }
            const data = await res.json();
            document.getElementById('stat-users').innerText = data.userCount;
            document.getElementById('stat-projects').innerText = data.projectCount;
            document.getElementById('stat-likes').innerText = data.likeCount;
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.latestProjects.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono text-xs text-gray-400">${p.id.substring(0,8)}...</td>
                    <td class="px-6 py-4">
                        ${p.thumbnail ? `<img src="${p.thumbnail}" class="w-12 h-12 rounded object-cover border">` : '无图'}
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-800">${p.name}</td>
                    <td class="px-6 py-4">${p.User ? p.User.username : '未知'}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-[10px] rounded-full uppercase tracking-wider ${p.is_public ? 'bg-emerald-100 text-emerald-600' : 'bg-gray-100 text-gray-500'}">${p.is_public ? '公开' : '私有'}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="deleteProject('${p.id}')" class="text-red-500 hover:text-red-700 font-medium">删除</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) {
            console.error(e);
        }
    }

    async function deleteProject(id) {
        if(!confirm('该操作将永久删除此作品，确认？')) return;
        try {
            const res = await fetch('/api/admin/project/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.ok) {
                loadData();
            } else {
                alert("删除失败");
            }
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
